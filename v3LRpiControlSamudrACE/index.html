<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE2-EAMv3 piControl Diagnostics</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark-theme">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light-theme" disabled>

<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --accent: #6c8aff;
    --accent-hover: #8aa3ff;
    --sidebar-w: 280px;
    --code-bg: #161922;
    --card-img-bg: #fff;
  }
  html.light {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #eef0f4;
    --border: #d8dbe4;
    --text: #1a1d27;
    --text-dim: #5c6070;
    --accent: #4a6adf;
    --accent-hover: #3a56c0;
    --code-bg: #fafbfc;
    --card-img-bg: #fff;

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    overflow-y: auto;
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 100;
  }
  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 4px;
  }
  #sidebar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  #theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #theme-toggle:hover { color: var(--text); border-color: var(--accent); }
  #sidebar .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);

  }
  .nav-group { margin-bottom: 4px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--surface2);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .nav-item .count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 10px;
    color: var(--text-dim);
  }
  .nav-item.active .count { background: rgba(108,138,255,0.15); color: var(--accent); }

  /* Main */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 32px 40px;
    max-width: 1400px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }
  .section-header h2 { font-size: 22px; font-weight: 700; }
  .section-header .script-badge {
    font-size: 12px;
    background: rgba(108,138,255,0.12);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    cursor: pointer;
    transition: background 0.15s;
  }
  .section-header .script-badge:hover { background: rgba(108,138,255,0.25); }
  .section-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: contain;
    background: var(--card-img-bg);
    display: block;
  }
  .card .label {

    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;

  #lightbox.open { display: flex; }

    border: none;
    color: #fff;
    font-size: 28px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.15s;
  }
  #lightbox .nav-btn:hover { background: rgba(255,255,255,0.2); }
  #lightbox .nav-btn.prev { left: 20px; }
  #lightbox .nav-btn.next { right: 20px; }
  #lightbox .close-btn {
    position: fixed;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: #fff;
    font-size: 32px;
    cursor: pointer;

    transition: opacity 0.15s;

    border-bottom: 1px solid var(--border);

    font-family: 'SF Mono', 'Fira Code', monospace;

    color: var(--text-dim);

    #main { margin-left: 0; padding: 20px; }
    body { flex-direction: column; }
  }
</style>

// ---- Theme ----
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('hljs-dark-theme').disabled = isLight;
  document.getElementById('hljs-light-theme').disabled = !isLight;
  document.getElementById('theme-toggle').innerHTML = isLight ? '&#9728;' : '&#9790;';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  // re-highlight open code if any
  const codeEl = document.getElementById('code-content');
  if (document.getElementById('code-modal').classList.contains('open') && codeEl.dataset.highlighted) {
    codeEl.removeAttribute('data-highlighted');
    hljs.highlightElement(codeEl);
  }
}
(function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('hljs-dark-theme').disabled = true;
    document.getElementById('hljs-light-theme').disabled = false;
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('theme-toggle').innerHTML = '&#9728;';
    });
  }
})();

// ---- Rendering ----
function renderNav(filter) {
  const nav = document.getElementById('nav-list');
  const q = (filter || '').toLowerCase();
  nav.innerHTML = categories.map(cat => {
    const matchCount = q
      ? cat.files.filter(f => f.toLowerCase().includes(q) || cat.title.toLowerCase().includes(q)).length
      : cat.files.length;
    if (q && matchCount === 0 && !cat.title.toLowerCase().includes(q)) return '';
    return `<div class="nav-item" data-cat="${cat.id}" onclick="navScrollTo('${cat.id}')">
      <span>${cat.title}</span>
      <span class="count">${q ? matchCount + '/' : ''}${cat.files.length}</span>
    </div>`;
  }).join('');
}

function renderContent(filter) {
  const content = document.getElementById('content');
  const q = (filter || '').toLowerCase();
  content.innerHTML = categories.map(cat => {
    const filteredFiles = q
      ? cat.files.filter(f => f.toLowerCase().includes(q) || cat.title.toLowerCase().includes(q))
      : cat.files;
    if (q && filteredFiles.length === 0 && !cat.title.toLowerCase().includes(q)) return '';
    const displayFiles = q && !cat.title.toLowerCase().includes(q) ? filteredFiles : cat.files;

    const scriptBadges = cat.scripts
      ? cat.scripts.map(s => `<span class="script-badge" onclick="event.stopPropagation();showCode('${s}')">${s}</span>`).join(' ')
      : cat.script
        ? `<span class="script-badge" onclick="event.stopPropagation();showCode('${cat.script}')">${cat.script}</span>`
        : '<span class="script-badge" style="opacity:0.4">external</span>';

    return `<section id="section-${cat.id}">
      <div class="section-header">
        <h2>${cat.title}</h2>
        ${scriptBadges}
      </div>
      <p class="section-desc">${cat.desc}</p>
      <div class="grid">
        ${displayFiles.map(f => `
          <div class="card" onclick="openLightbox('${cat.id}','${f}')">
            <img src="${BASE}/${cat.dir}/${f}" alt="${f}" loading="lazy">
            <div class="label">${f.replace('.png','')}</div>
          </div>
        `).join('')}
      </div>
    </section>`;
  }).join('');
}

function navScrollTo(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-cat="${id}"]`)?.classList.add('active');
  document.getElementById('section-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- Search ----
document.getElementById('search').addEventListener('input', function() {
  renderNav(this.value);
  renderContent(this.value);
});

// ---- Lightbox ----

function openLightbox(catId, file) {
  currentCat = categories.find(c => c.id === catId);
  currentIdx = currentCat.files.indexOf(file);
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function navigateLightbox(dir) {
  if (!currentCat) return;
  currentIdx = (currentIdx + dir + currentCat.files.length) % currentCat.files.length;
  updateLightbox();
}
function updateLightbox() {
  const f = currentCat.files[currentIdx];
  document.getElementById('lb-img').src = `${BASE}/${currentCat.dir}/${f}`;
  document.getElementById('lb-caption').textContent = `${currentCat.dir}/${f}  (${currentIdx+1}/${currentCat.files.length})`;
}

document.addEventListener('keydown', e => {
  if (document.getElementById('code-modal').classList.contains('open')) {
    if (e.key === 'Escape') closeCode();
    return;
  }
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') navigateLightbox(1);
    else if (e.key === 'ArrowLeft') navigateLightbox(-1);
  }
});

// ---- Code viewer ----
const codeCache = {};

async function showCode(filename) {
  document.getElementById('code-title').textContent = filename;
  const modal = document.getElementById('code-modal');
  const codeEl = document.getElementById('code-content');

  function highlightCode(text) {
    codeEl.textContent = text;
    codeEl.className = 'language-python';
    codeEl.removeAttribute('data-highlighted');
    hljs.highlightElement(codeEl);
  }

  if (codeCache[filename]) {
    highlightCode(codeCache[filename]);
  } else {
    codeEl.className = '';
    codeEl.removeAttribute('data-highlighted');
    codeEl.textContent = 'Loading...';
    try {
      const resp = await fetch(`${BASE}/${filename}`);
      if (!resp.ok) throw new Error(resp.statusText);
      const text = await resp.text();
      codeCache[filename] = text;
      highlightCode(text);
    } catch (e) {
      codeEl.className = '';
      codeEl.removeAttribute('data-highlighted');
      codeEl.textContent = `Failed to load ${filename}: ${e.message}\n\nNote: Code viewing requires serving this page via HTTP (e.g. python -m http.server).`;
    }
  }
  modal.classList.add('open');
}
function closeCode() {
  document.getElementById('code-modal').classList.remove('open');
}

// ---- Scroll spy ----
function updateActiveNav() {
  const sections = categories.map(c => document.getElementById('section-' + c.id)).filter(Boolean);
  let activeId = categories[0]?.id;
  for (const s of sections) {
    if (s.getBoundingClientRect().top <= 100) activeId = s.id.replace('section-', '');
  }
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === activeId);
  });
}
document.getElementById('main')?.parentElement?.addEventListener('scroll', updateActiveNav);
window.addEventListener('scroll', updateActiveNav);

// ---- Init ----
renderNav();
renderContent();
updateActiveNav();
</script>
